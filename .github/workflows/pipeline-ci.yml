name: Smart City Data Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install pyspark pandas numpy

    - name: Run import check
      run: |
        python -c "import sys; print('Python OK')"

    - name: Run pipeline test (lightweight)
      run: |
        python3 -m src.pipeline.run_pipeline
